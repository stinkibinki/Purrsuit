<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Purrsuit</title>
    <script type="importmap">
    {
        "imports": {
            "engine/": "./engine/",
            "dat": "./lib/dat.js",
            "glm": "./lib/glm.js"
        }
    }
    </script>
    <link rel="stylesheet" href="engine/style.css">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <style>
        #loadingSpinner {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        #loadingSpinner.hidden {
            display: none;
        }
    </style>
    <script type="module" src="main.js"></script>
</head>
<body>
    <div id="loadingSpinner">
        <div class="spinner"></div>
    </div>
    <div class="fullscreen no-touch pixelated">
        <canvas></canvas>
        <div id="cursor">
            <img src="game/assets/cursor.png" id="cursor-img" />
        </div>
        <div id="hud" class="hidden">
            <div id="timer"></div>
            <div id="msg" class="hidden"></div>
            <div id="score"></div>
        </div>
        <div id="mainMenu" class="main-menu active">
            <div class="menu-content">
                <h1>Purrsuit</h1>
                <p class="game-goal">Cilj igre je pobožati vse mačke, preden se izteče čas.</p>
                <div class="controls-list">
                    <p><strong>WASD</strong> - Premik</p>
                    <p><strong>Miška</strong> - Pogled</p>
                    <p><strong>E</strong> - Interakcija</p>
                </div>
                <button id="playButton" class="play-button">PLAY</button>
            </div>
        </div>
    </div>
    <script>
        setTimeout(() => {
            document.getElementById('loadingSpinner').classList.add('hidden');
        }, 11000);
    </script>
</body>
</html>
